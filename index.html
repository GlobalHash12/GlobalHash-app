<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobalNovel - Multi-Language Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- LANGUAGE SELECTION (ልክ እንደ ምስልህ) -->
        <div id="language-section" class="page active">
            <header class="header-nav">
                <div class="logo">GLOBAL<span>NOVEL</span></div>
                <div class="nav-icons">
                    <span class="icon">🔍</span>
                    <span class="icon">📧</span>
                    <span class="icon">🔔</span>
                </div>
            </header>
            <div class="language-list" id="language-list">
                <!-- 14 Languages will be loaded here -->
            </div>
        </div>

        <!-- LIBRARY PAGE -->
        <div id="library-section" class="page">
            <button class="back-btn" onclick="showPage('language-section')">← Change Language</button>
            <h2 id="selected-lang-title">Novels</h2>
            <div class="book-grid" id="book-list"></div>
        </div>

        <!-- READER PAGE -->
        <div id="reader-section" class="page">
            <button class="back-btn" onclick="showPage('library-section')">← Back to Library</button>
            <h2 id="reading-title">Book Title</h2>
            <div id="chapter-list" class="chapter-container"></div>
            <div id="content-display" class="novel-text hidden"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
