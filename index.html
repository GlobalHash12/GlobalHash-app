<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobalHash TON Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="top-nav">
            <div class="user-pill"><span id="username">@User</span></div>
            <div id="tier-badge" class="tier-bronze">BRONZE</div>
        </div>

        <div id="mine-section" class="content-section active">
            <div class="main-display">
                <p class="label">GH BALANCE</p>
                <div class="balance-row">
                    <!-- የ TON ምስል እዚህ ጋር ገብቷል -->
                    <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" class="coin-img">
                    <h1 id="balance">0.0000</h1>
                </div>
            </div>
            <div class="mining-card">
                <div class="medal-badge">🏅</div>
                <div class="card-header">
                    <span id="status-text">STATUS: IDLE</span>
                    <span id="timer" class="timer">24:00:00</span>
                </div>
                <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
                <p class="ad-info">Daily Ads: <span id="ad-count">0/20</span></p>
                <button id="action-btn" class="main-action" onclick="showAd()">WATCH AD TO START</button>
            </div>
        </div>

        <div id="team-section" class="content-section">
            <h2 class="title">YOUR TEAM</h2>
            <div class="stats-grid">
                <div class="stat-card"><p>Friends</p><h3 id="friends-count">0</h3></div>
                <div class="stat-card"><p>Bonus</p><h3>+10%</h3></div>
            </div>
            <button class="pro-button" onclick="inviteFriends()">INVITE FRIENDS</button>
        </div>

        <div id="wallet-section" class="content-section">
            <h2 class="title">WALLET</h2>
            <div class="wallet-card">
                <p>Available</p>
                <h2 id="wallet-balance">0.0000 GH</h2>
            </div>
            <input type="text" id="wallet-address" placeholder="Enter TON Wallet Address">
            <button class="pro-button" onclick="requestWithdraw()">WITHDRAW</button>
        </div>

        <nav class="bottom-menu">
            <button class="nav-item active" onclick="showTab('mine')">⛏ Mine</button>
            <button class="nav-item" onclick="showTab('team')">👥 Team</button>
            <button class="nav-item" onclick="showTab('wallet')">💼 Wallet</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
