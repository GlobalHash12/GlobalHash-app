<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobalNovel Elite</title>
    <!-- አስፈላጊ ስክሪፕቶች -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-nav">
            <div class="logo">GLOBAL<span>NOVEL</span></div>
            <div class="header-icons">
                <div class="icon-circle blue">🔍</div>
                <div class="icon-circle dark-blue">@</div>
                <div class="icon-circle notify-blue">🔔</div>
            </div>
        </header>

        <!-- 1. Language Page -->
        <div id="language-section" class="page active">
            <div class="lang-container">
                <div class="lang-item" onclick="selectLang('am', 'Amharic')"><img src="https://flagcdn.com/w320/et.png"><p>Amharic Novels</p></div>
                <div class="lang-item" onclick="selectLang('en', 'English')"><img src="https://flagcdn.com/w320/gb.png"><p>English Novels</p></div>
                <div class="lang-item" onclick="selectLang('id', 'Indonesian')"><img src="https://flagcdn.com/w320/id.png"><p>Indonesian</p></div>
                <div class="lang-item" onclick="selectLang('ko', 'Korean')"><img src="https://flagcdn.com/w320/kr.png"><p>Korean Novels</p></div>
                <div class="lang-item" onclick="selectLang('ja', 'Japanese')"><img src="https://flagcdn.com/w320/jp.png"><p>Japanese Novels</p></div>
                <div class="lang-item" onclick="selectLang('pt', 'Portuguese')"><img src="https://flagcdn.com/w320/pt.png"><p>Portuguese Novels</p></div>
                <div class="lang-item" onclick="selectLang('ru', 'Russian')"><img src="https://flagcdn.com/w320/ru.png"><p>Russian Novels</p></div>
                <div class="lang-item" onclick="selectLang('ar', 'Arabic')"><img src="https://flagcdn.com/w320/sa.png"><p>Arabic Novels</p></div>
            </div>
        </div>

        <!-- 2. Library Page -->
        <div id="library-section" class="page">
            <button class="back-link" onclick="showPage('language-section')">← Change Language</button>
            <h2 id="selected-lang-title">Books</h2>
            <div class="book-grid" id="book-list"></div>
        </div>

        <!-- 3. Reader Page -->
        <div id="reader-section" class="page">
            <button class="back-link" onclick="showPage('library-section')">← Back to Books</button>
            <h2 id="reading-title">Reading...</h2>
            <div id="chapter-list" class="chapter-container"></div>
            <div id="content-display" class="novel-text hidden"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
