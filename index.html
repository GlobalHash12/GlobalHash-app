<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobalNovel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- HEADER (ልክ እንደ ምስልህ) -->
        <header class="main-nav">
            <div class="logo">GLOBAL<span>NOVEL</span></div>
            <div class="header-icons">
                <div class="icon-circle blue">🔍</div>
                <div class="icon-circle dark-blue">@</div>
                <div class="icon-circle light-blue">▼</div>
                <div class="icon-circle notify-blue">🔔</div>
            </div>
        </header>

        <!-- LANGUAGE LIST PAGE -->
        <div id="language-section" class="page active">
            <div class="lang-container" id="language-list">
                <!-- 14 Languages will appear here -->
            </div>
        </div>

        <!-- LIBRARY PAGE -->
        <div id="library-section" class="page">
            <button class="back-link" onclick="showPage('language-section')">← Back to Languages</button>
            <h2 id="selected-lang-title">Novels</h2>
            <div class="book-grid" id="book-list"></div>
        </div>

        <!-- READER PAGE -->
        <div id="reader-section" class="page">
            <button class="back-link" onclick="showPage('library-section')">← Back to Library</button>
            <h2 id="reading-title">Book Title</h2>
            <div id="chapter-list" class="chapter-container"></div>
            <div id="content-display" class="novel-text hidden"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
